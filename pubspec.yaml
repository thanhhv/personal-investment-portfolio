name: wealth_lens
description: Personal investment portfolio tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  bloc: ^8.1.4
  equatable: ^2.0.5
  file_picker: ^8.1.7
  fl_chart: ^0.69.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
